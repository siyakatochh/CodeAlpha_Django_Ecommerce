{% extends 'base.html' %}

{% block content %}

<div style="display:flex; gap:50px; padding:40px; max-width:1100px; margin:auto;">

    <!-- Product Image -->
    <div>
        <img src="{{ product.image.url }}" alt="{{ product.name }}"
             style="width:420px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,.2);">
    </div>

    <!-- Product Details -->
    <div style="flex:1;">

        <h1>{{ product.name }}</h1>

        <h2 style="color:#28a745; font-size:32px;">
            ₹{{ product.price }}
        </h2>

        <h4 style="color:orange;">
            ⭐⭐⭐⭐⭐ 4.8 (245 Reviews)
        </h4>

        <p style="color:green; font-weight:bold;">
            ✅ In Stock
        </p>

        <hr>

        <h3>Description</h3>

        <p style="line-height:28px;">
            {{ product.description }}
        </p>

        <br>

        <a href="{% url 'add_to_cart' product.id %}">
            <button style="padding:14px 30px;
                           background:#ff9800;
                           color:white;
                           border:none;
                           border-radius:8px;
                           font-size:18px;
                           cursor:pointer;">
                🛒 Add To Cart
            </button>
        </a>

        &nbsp;

        <a href="{% url 'add_to_wishlist' product.id %}">
            <button style="padding:14px 30px;
                           background:#e91e63;
                           color:white;
                           border:none;
                           border-radius:8px;
                           font-size:18px;
                           cursor:pointer;">
                ❤️ Wishlist
            </button>
        </a>

        <br><br>

        <a href="/">
            <button style="padding:12px 25px;
                           background:#555;
                           color:white;
                           border:none;
                           border-radius:8px;
                           cursor:pointer;">
                ⬅ Back to Home
            </button>
        </a>

    </div>

</div>

{% endblock %}
