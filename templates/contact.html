{% extends 'base.html' %}

{% block content %}

<div style="max-width:700px; margin:auto; padding:40px;">

<h1>Contact Us</h1>

<form>

<label>Name</label><br>
<input type="text" placeholder="Enter your name" style="width:100%;padding:10px;"><br><br>

<label>Email</label><br>
<input type="email" placeholder="Enter your email" style="width:100%;padding:10px;"><br><br>

<label>Message</label><br>
<textarea rows="6" placeholder="Write your message..." style="width:100%;padding:10px;"></textarea><br><br>

<button style="
background:#ff9800;
color:white;
padding:12px 30px;
border:none;
border-radius:6px;">
Send Message
</button>

</form>

</div>

{% endblock %}
