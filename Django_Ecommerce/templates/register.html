{% extends 'base.html' %}

{% block content %}

<h1 class="heading">Register</h1>

<div style="width:400px; margin:60px auto; background:white; padding:30px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2);">

    <form method="POST">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" required
               style="width:100%; padding:10px; margin:10px 0;">

        <label>Email</label>
        <input type="email" name="email" required
               style="width:100%; padding:10px; margin:10px 0;">

        <label>Password</label>
        <input type="password" name="password1" required
               style="width:100%; padding:10px; margin:10px 0;">

        <label>Confirm Password</label>
        <input type="password" name="password2" required
               style="width:100%; padding:10px; margin:10px 0;">

        <button type="submit"
                style="width:100%; padding:12px; background:green; color:white; border:none; margin-top:10px;">
            Create Account
        </button>

    </form>

    <p style="text-align:center; margin-top:15px;">
        Already have account?
        <a href="/login/">Login</a>
    </p>

</div>

{% endblock %}
